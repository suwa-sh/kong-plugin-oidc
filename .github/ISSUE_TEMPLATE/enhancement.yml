name: 改善・リファクタ提案
description: 新機能 / リファクタ / 仕様変更を提案する
title: "[Enhancement] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        スコープの暴走を防ぐため「非目標」を明記してください。
        複数の実装案がある場合は案の比較を添えてください。
        `breaking-change` を選ぶ場合は「移行・互換性」に既存利用者への影響と移行経路を書いてください。

  - type: dropdown
    id: type
    attributes:
      label: 種別
      options:
        - feature (新機能)
        - refactor (リファクタ)
        - breaking-change (互換性に影響する変更)
        - chore (ビルド / CI / 運用)
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 背景・課題
      description: 今の実装で何が困るか。該当コードの引用を含めてください。
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: ゴール
      description: 達成したい状態を 1-3 行で
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案
      description: 方針。複数案ある場合は箇条書きや表で比較
      placeholder: |
        - 案 A: ...
        - 案 B: ...（採用推奨、理由: ...）
    validations:
      required: true

  - type: textarea
    id: implementation_example
    attributes:
      label: 変更例
      description: 実装イメージ。確定 diff ではなく参考例として記載してください。

  - type: textarea
    id: non_goals
    attributes:
      label: 非目標 (Non-goals)
      description: やらないことを明示
      placeholder: |
        - 既存の "yes"/"no" 文字列フラグの削除は次メジャーで扱うため本 issue では行わない
    validations:
      required: true

  - type: textarea
    id: migration
    attributes:
      label: 移行・互換性
      description: |
        breaking-change の場合は必須。
        それ以外（feature / refactor / chore）でも既存利用者への挙動・表現・DB スキーマに影響がある場合は記載してください。
        影響がない場合は「なし」と明記。
      placeholder: |
        - 影響範囲: ...
        - 回避策 / 移行手順: ...
        - リリースノートでの告知: ...

  - type: textarea
    id: acceptance
    attributes:
      label: 受け入れ条件
      placeholder: |
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: test
    attributes:
      label: テスト観点
      placeholder: |
        - unit: ...
        - integration: ...
        - e2e: ...

  - type: textarea
    id: references
    attributes:
      label: 参考
      description: 関連 issue / PR / ドキュメント URL
