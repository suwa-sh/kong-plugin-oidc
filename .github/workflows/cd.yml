name: CD

on:
  push:
    tags:
      - "v*"

env:
  IMAGE: ghcr.io/suwa-sh/kong-plugin-oidc

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      plugin: ${{ steps.versions.outputs.plugin }}
      matrix: ${{ steps.versions.outputs.matrix }}
      latest_kong: ${{ steps.versions.outputs.latest_kong }}
    steps:
      - uses: actions/checkout@v4

      - name: Build matrix from .kong-versions
        id: versions
        run: |
          PLUGIN="${GITHUB_REF_NAME#v}"
          # 各行ごとにコメントと空白を除去（改行は保持）
          mapfile -t KONG_VERSIONS < <(sed -e 's/#.*$//' -e 's/[[:space:]]//g' .kong-versions | grep .)
          if [ "${#KONG_VERSIONS[@]}" -eq 0 ]; then
            echo "ERROR: .kong-versions is empty" >&2
            exit 1
          fi
          # JSON 配列に整形
          MATRIX=$(printf '%s\n' "${KONG_VERSIONS[@]}" | jq -R . | jq -sc .)
          # latest = 末尾の版（運用ルール: ファイルは古→新の順で記載）
          LATEST="${KONG_VERSIONS[-1]}"
          echo "plugin=$PLUGIN" >> "$GITHUB_OUTPUT"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "latest_kong=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Plugin: $PLUGIN"
          echo "Matrix: $MATRIX"
          echo "Latest Kong: $LATEST"

  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        kong_version: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute Kong short tag
        id: kong
        run: |
          # 例: 3.12.0.5-ubuntu → 3.12.0.5
          KONG_SHORT=$(echo "${{ matrix.kong_version }}" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?')
          echo "short=$KONG_SHORT" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (per Kong version)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            KONG_VERSION=${{ matrix.kong_version }}
          tags: |
            ${{ env.IMAGE }}:kong-${{ steps.kong.outputs.short }}-${{ needs.prepare.outputs.plugin }}
          cache-from: type=gha,scope=${{ matrix.kong_version }}
          cache-to: type=gha,mode=max,scope=${{ matrix.kong_version }}

  tag-latest:
    needs: [prepare, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Retag latest Kong build as :latest
        run: |
          KONG_SHORT=$(echo "${{ needs.prepare.outputs.latest_kong }}" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?')
          SRC="${IMAGE}:kong-${KONG_SHORT}-${{ needs.prepare.outputs.plugin }}"
          DST="${IMAGE}:latest"
          echo "Retag $SRC -> $DST"
          docker buildx imagetools create --tag "$DST" "$SRC"

  github-release:
    needs: [prepare, build-and-push, tag-latest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          PLUGIN="${{ needs.prepare.outputs.plugin }}"
          # CHANGELOG.md から該当バージョンセクションを抽出
          NOTES=$(awk -v ver="$PLUGIN" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "WARN: CHANGELOG.md に [$PLUGIN] セクションが見つかりません。最小限のノートで作成します。" >&2
            NOTES="$(printf 'Release v%s\n\nDetails: see git log.' "$PLUGIN")"
          fi
          # GHCR タグ一覧を追記
          IMAGE_TAGS=""
          while IFS= read -r kv; do
            short=$(echo "$kv" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?')
            IMAGE_TAGS="${IMAGE_TAGS}- \`${IMAGE}:kong-${short}-${PLUGIN}\`"$'\n'
          done < <(sed -e 's/#.*$//' -e 's/[[:space:]]//g' .kong-versions | grep .)
          IMAGE_TAGS="${IMAGE_TAGS}- \`${IMAGE}:latest\` (= $(echo "${{ needs.prepare.outputs.latest_kong }}" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?') を retag)"$'\n'
          {
            echo "$NOTES"
            echo ""
            echo "### Container images"
            echo ""
            printf '%s\n' "$IMAGE_TAGS"
          } > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md
